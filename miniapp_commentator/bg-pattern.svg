<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <defs>
    <pattern id="p" width="56" height="56" patternUnits="userSpaceOnUse">
      <!-- Doodle-like chat pattern (used as mask) -->
      <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
        <!-- speech bubble -->
        <path d="M12 14c0-3 2.5-5.5 5.5-5.5H30c3 0 5.5 2.5 5.5 5.5v7c0 3-2.5 5.5-5.5 5.5H22l-5.5 4v-4H17.5C14.5 26.5 12 24 12 21z" opacity="0.10" stroke-width="2"/>
        <path d="M18 17h12M18 21h8" opacity="0.10" stroke-width="2"/>

        <!-- paper plane -->
        <path d="M42 38l10-4-4 10-2.8-2.8-2.4 2.4-1.8-6.2z" opacity="0.08" stroke-width="2"/>
        <path d="M52 34l-8.8 6.4" opacity="0.08" stroke-width="2"/>

        <!-- heart -->
        <path d="M16 44c0-2 1.6-3.5 3.5-3.5 1.3 0 2.4.7 3 1.8.6-1.1 1.7-1.8 3-1.8 1.9 0 3.5 1.6 3.5 3.5 0 3.4-6.5 6.8-6.5 6.8S16 47.4 16 44z" opacity="0.08" stroke-width="2"/>

        <!-- star -->
        <path d="M44 10l1.6 4.8 5 .1-4 2.9 1.4 4.9-4-2.8-4 2.8 1.4-4.9-4-2.9 5-.1z" opacity="0.06" stroke-width="2"/>
      </g>
    </pattern>
  </defs>
  <rect width="280" height="280" fill="url(#p)"/>
</svg>
