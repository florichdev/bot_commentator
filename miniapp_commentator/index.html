  <div class="chat">
    <header class="chat__header">
      <div class="chat__headerInner">
        <div class="chat__title">
          <div class="chat__titleLine">Комментатор</div>
          <div id="postInfo" class="chat__subtitle">Пост: —</div>
        </div>
        <button id="shareBtn" class="iconBtn" type="button" aria-label="Поделиться">
          <svg class="icon"><use href="#i_share"></use></svg>
        </button>
      </div>
      <div class="chat__headerBlur"></div>
    </header>

    <section class="chat__controls">
      <button id="sortBtn" class="pill" type="button">Сначала новые</button>
      <button id="clearBtn" class="pill pill--danger" type="button">Очистить</button>
      <button id="searchToggleBtn" class="pill pill--icon" type="button" aria-label="Поиск">
        <svg class="icon"><use href="#i_search"></use></svg>
      </button>
      <button id="settingsBtn" class="pill pill--icon" type="button" aria-label="Настройки">
        <svg class="icon"><use href="#i_settings"></use></svg>
      </button>
    </section>
    <section class="chat__tools">
      <div id="commentsCount" class="commentsCount">Комментариев: 0</div>
      <div id="searchPanel" class="searchPanel" hidden>
        <input id="searchInput" class="searchInput" type="text" placeholder="Поиск по комментариям">
        <button id="searchCloseBtn" class="searchCloseBtn" type="button" aria-label="Закрыть поиск">✕</button>
      </div>
    </section>

    <section class="chat__body" aria-label="Список комментариев">
      <ul id="commentsList" class="msgs"></ul>
      <div id="emptyState" class="emptyCapsule">Пока нет комментариев. Будьте первым 👇</div>
    </section>
    <button id="scrollDownBtn" class="scrollDownBtn" type="button" aria-label="Прокрутить вниз">↓</button>
    <div id="contextMenuOverlay" class="contextMenuOverlay" hidden></div>
    <div id="contextMenu" class="comment-context-menu-popover" role="dialog" aria-label="Действия с комментарием" hidden>
      <div class="comment-context-menu" role="menu">
        <div id="contextReactions" class="comment-context-menu__reactions"></div>
        <button type="button" class="comment-context-menu__item" data-menu-action="reply" role="menuitem"><svg class="comment-context-menu__item-icon" width="20" height="20" aria-hidden="true"><use href="#icon_reply_20"></use></svg><span class="comment-context-menu__item-label">Ответить</span></button>
        <button type="button" class="comment-context-menu__item" data-menu-action="copy" role="menuitem"><svg class="comment-context-menu__item-icon" width="20" height="20" aria-hidden="true"><use href="#icon_copy_20"></use></svg><span class="comment-context-menu__item-label">Скопировать</span></button>
        <button type="button" class="comment-context-menu__item" data-menu-action="report" role="menuitem"><svg class="comment-context-menu__item-icon" width="20" height="20" aria-hidden="true"><use href="#icon_report_20"></use></svg><span class="comment-context-menu__item-label">Пожаловаться</span></button>
        <button type="button" class="comment-context-menu__item comment-context-menu__item--danger" data-menu-action="delete" role="menuitem"><svg class="comment-context-menu__item-icon" width="20" height="20" aria-hidden="true"><use href="#icon_delete_20"></use></svg><span class="comment-context-menu__item-label">Удалить</span></button>
        <div class="comment-context-menu__divider" aria-hidden="true"></div>
        <button type="button" class="comment-context-menu__item" data-menu-action="select" role="menuitem"><svg class="comment-context-menu__item-icon" width="20" height="20" aria-hidden="true"><use href="#icon_done_round_20"></use></svg><span class="comment-context-menu__item-label">Выбрать</span></button>
      </div>
    </div>

    <footer class="chat__composer">
      <div class="chat__composerBlur"></div>
      <div id="replyPreview" class="replyPreview" hidden>
        <span id="replyPreviewAuthor" class="replyPreview__author"></span>
        <span id="replyPreviewText" class="replyPreview__text"></span>
        <button id="replyCancelBtn" class="replyPreview__cancel" type="button" aria-label="Отменить ответ">×</button>
      </div>
      <div class="composer">
        <button id="attachBtn" class="iconBtn iconBtn--attach" type="button" aria-label="Вложения">
          <svg class="icon"><use href="#i_attach"></use></svg>
        </button>
        <input id="fileInput" type="file" hidden multiple accept="image/*,.pdf,.txt,.doc,.docx,.xls,.xlsx">
        <textarea
          id="commentInput"
          class="composer__input"
          placeholder="Сообщение"
          rows="1"
          maxlength="4000"
        ></textarea>
        <button id="sendBtn" class="sendBtn" type="button" aria-label="Отправить">
          <svg class="icon icon--send"><use href="#i_send"></use></svg>
        </button>
      </div>
      <div id="attachmentsBar" class="attachmentsBar" hidden></div>
      <div class="composer__meta">
        <span id="charCounter" class="composer__counter">0 / 4000</span>
      </div>
    </footer>
  </div>

  <div id="settingsModal" class="settingsModal" hidden>
    <div class="settingsModal__content">
      <div class="settingsModal__header">
        <div class="settingsModal__title">Настройки</div>
        <button id="settingsCloseBtn" class="settingsModal__close" type="button" aria-label="Закрыть">✕</button>
      </div>
      <div class="settingsModal__section">
        <div class="settingsModal__label">Тема</div>
        <div class="settingsModal__row">
          <button class="settingsChip" data-theme="light" type="button">Светлая</button>
          <button class="settingsChip" data-theme="system" type="button">Системная</button>
          <button class="settingsChip" data-theme="dark" type="button">Темная</button>
        </div>
      </div>
      <div class="settingsModal__section">
        <div class="settingsModal__label">Градиент фона</div>
        <div class="settingsModal__palette" id="paletteGrid"></div>
      </div>
      <div class="settingsModal__section">
        <button id="openBotBtn" class="settingsConnectBtn" type="button">Подключение</button>
      </div>
    </div>
  </div>

  <template id="commentTemplate">
    <li class="msg">
      <div class="msg__avatar" aria-hidden="true"></div>
      <div class="bubble">
        <div class="bubble__meta">
          <span class="bubble__author"></span>
        </div>
        <div class="bubble__text"></div>
        <div class="bubble__reactions"></div>
        <div class="bubble__footer">
          <time class="bubble__time"></time>
          <button class="bubble__action" data-action="reply-inline" type="button">Ответить</button>
        </div>
      </div>
    </li>
  </template>

  <script src="./app.js"></script>
</body>
</html>
